services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - node_modules:/app/node_modules/

    develop:
      watch:
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package.lock.json
        - action: rebuild
          path: ./vite.config.ts
        - action: sync
          path: .
          target: /app

volumes:
  node_modules:
